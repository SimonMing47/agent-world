name: Build OpenViking Linux Binaries

# This workflow is intentionally checked in so Linux OpenViking binaries can be
# rebuilt on matching GitHub-hosted Linux runners instead of cross-built.

on:
  workflow_dispatch:
  push:
    branches:
      - codex/linux-arm64-openviking
    paths:
      - ".github/workflows/build-openviking-linux.yml"
      - "scripts/openviking-build-binary.mjs"
      - "scripts/openviking-server-entry.py"
      - "scripts/openviking-common.mjs"
      - "thirdparty/openviking/wheels/**"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: openviking-server-linux-x64
            runner: ubuntu-24.04
          - artifact: openviking-server-linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheelhouse for runner platform
        run: |
          python -m pip install --upgrade pip
          python -m pip download \
            --dest .tmp/openviking-linux-wheels \
            "openviking==0.3.20" \
            "pyinstaller==6.20.0"

      - name: Build OpenViking binary
        env:
          OPENVIKING_PIP_SPEC: openviking==0.3.20
          OPENVIKING_WHEELHOUSE_DIR: .tmp/openviking-linux-wheels
          OPENVIKING_BINARY_ARCHIVE: "1"
        run: node scripts/openviking-build-binary.mjs

      - name: Verify binary
        run: |
          thirdparty/openviking/bin/${{ matrix.artifact }} --version
          stat -c '%s %n' thirdparty/openviking/bin/${{ matrix.artifact }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            thirdparty/openviking/bin/${{ matrix.artifact }}.xz.part-*
            thirdparty/openviking/manifest-linux-*.json
            thirdparty/openviking/manifest.json
          if-no-files-found: error
